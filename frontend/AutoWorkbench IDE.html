<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AutoWorkbench — Editorial / IDE</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="style-ide.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { overflow: hidden; background: #f0eee9; }

  .aw-artboard {
    position: relative; width: 100%; height: 100%;
    overflow: hidden; display: flex;
  }
  .aw-artboard .pagewrap {
    flex: 1; min-width: 0; height: 100%;
    overflow: hidden; position: relative;
  }
  .aw-artboard .panelwrap {
    flex: 0 0 auto; height: 100%;
    border-left: 3px solid #1e2030;
    box-shadow: -8px 0 32px rgba(30,32,48,0.18);
    position: relative;
  }
  .page-scrim {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(90deg, transparent 60%, rgba(30,32,48,0.10) 100%);
  }
</style>
<template id="__bundler_thumbnail" data-bg-color="#f8f5f0">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <!-- page mock bg -->
    <rect width="120" height="80" fill="#f8f5f0"/>
    <!-- browser chrome -->
    <rect x="0" y="0" width="120" height="10" fill="#ebe9e3"/>
    <circle cx="6" cy="5" r="2" fill="#ff5f57"/>
    <circle cx="12" cy="5" r="2" fill="#febc2e"/>
    <circle cx="18" cy="5" r="2" fill="#28c840"/>
    <rect x="28" y="2" width="50" height="6" rx="2" fill="#fff"/>
    <!-- hero area -->
    <rect x="20" y="22" width="60" height="5" rx="1" fill="#0c1322" opacity=".8"/>
    <rect x="28" y="30" width="44" height="3" rx="1" fill="#3a4150" opacity=".5"/>
    <rect x="32" y="36" width="36" height="3" rx="1" fill="#3a4150" opacity=".4"/>
    <!-- CTA buttons -->
    <rect x="30" y="43" width="18" height="6" rx="2" fill="#1a1f2b"/>
    <rect x="52" y="43" width="18" height="6" rx="2" fill="#fff" stroke="#ccc" stroke-width=".5"/>
    <!-- IDE panel (right side) -->
    <rect x="78" y="0" width="42" height="80" fill="#f8f5f0"/>
    <rect x="78" y="0" width="3" height="80" fill="#1e2030"/>
    <!-- terminal header -->
    <rect x="81" y="0" width="39" height="14" fill="#1e2030"/>
    <rect x="85" y="4" width="12" height="3" rx="1" fill="#4a9eff" opacity=".7"/>
    <rect x="99" y="4" width="8" height="3" rx="1" fill="#5a6078"/>
    <!-- file tabs -->
    <rect x="81" y="14" width="39" height="8" fill="#f0ece4"/>
    <rect x="81" y="14" width="14" height="8" fill="#f8f5f0"/>
    <rect x="81" y="20" width="14" height="2" fill="#4a9eff"/>
    <!-- cards with colored rails -->
    <rect x="83" y="24" width="35" height="12" rx="1" fill="#fff" stroke="#ddd8d0" stroke-width=".5"/>
    <rect x="83" y="24" width="2.5" height="12" fill="#b787f5"/>
    <rect x="83" y="38" width="35" height="10" rx="1" fill="#fff" stroke="#ddd8d0" stroke-width=".5"/>
    <rect x="83" y="38" width="2.5" height="10" fill="#4a9eff"/>
    <rect x="83" y="50" width="35" height="10" rx="1" fill="#fff" stroke="#ddd8d0" stroke-width=".5"/>
    <rect x="83" y="50" width="2.5" height="10" fill="#f5b544"/>
    <rect x="83" y="62" width="35" height="10" rx="1" fill="#fff" stroke="#ddd8d0" stroke-width=".5"/>
    <rect x="83" y="62" width="2.5" height="10" fill="#34d39c"/>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="aw-pagemock.jsx"></script>
  <script type="text/babel" src="aw-bits.jsx"></script>
  <script type="text/babel" src="aw-ide-panel.jsx"></script>

  <script type="text/babel">
  /* global React, ReactDOM, DesignCanvas, DCSection, DCArtboard,
     PlaywrightMock, IDEPanel,
     useTweaks, TweaksPanel, TweakSection, TweakSlider, TweakRadio */

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "panelWidth": 460,
    "density": "compact"
  }/*EDITMODE-END*/;

  function IDEArtboard({ state, panelWidth, density }) {
    return (
      <div className="aw-artboard">
        <div className="pagewrap">
          <PlaywrightMock />
          <div className="page-scrim" />
        </div>
        <div className={`panelwrap aw-density-${density}`} style={{ width: panelWidth }}>
          <IDEPanel state={state} tab="workbench" />
        </div>
      </div>
    );
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const AW = 1080, AH = 760;
    const states = [
      { id:"idle",     label:"01 · Idle" },
      { id:"planning", label:"02 · Planning" },
      { id:"await",    label:"03 · Awaiting Confirmation" },
      { id:"exec",     label:"04 · Executing" },
      { id:"recover",  label:"05 · Recovery Needed" },
      { id:"done",     label:"06 · Completed" },
    ];
    return (
      <>
        <DesignCanvas>
          <DCSection
            id="ide-states"
            title="AutoWorkbench · Editorial / IDE"
            subtitle="Cream monospace panel — warm off-white, file-tab chrome, terminal header, ink border rail. All 6 agent states."
          >
            {states.map(s => (
              <DCArtboard key={s.id} id={s.id} label={s.label} width={AW} height={AH}>
                <IDEArtboard state={s.id} panelWidth={t.panelWidth} density={t.density} />
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="IDE Variant">
          <TweakSection label="Panel" />
          <TweakSlider label="Panel width" value={t.panelWidth}
                       min={380} max={560} step={10} unit="px"
                       onChange={v => setTweak("panelWidth", v)} />
          <TweakRadio  label="Density" value={t.density}
                       options={["compact","regular","comfy"]}
                       onChange={v => setTweak("density", v)} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
