<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AutoWorkbench — Preview (demo mode)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Inline the dist CSS as a <style id="autoworkbench-style"> tag so the
     ShadowRoot adapter (ensureShadowStyles in src/main.jsx) can clone it
     into the shadow tree. This is the same mechanism browser.py uses for
     live runtime — `:host([data-theme="dark"])` only works when the rule
     lives INSIDE the shadow stylesheet. -->
<style id="autoworkbench-style"></style>
<style>
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page, #E9E3D2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh;
    overflow: hidden;
  }
  .demo-banner {
    position: fixed;
    top: 12px; left: 12px;
    background: #FBEBD5; color: #B85A2A;
    border: 1px solid #ECC79A; border-radius: 999px;
    padding: 6px 12px; font-size: 12px; font-weight: 600;
    box-shadow: 0 1px 4px rgba(20,18,12,0.08);
    z-index: 10001;
    pointer-events: none;
  }
  /* TweaksPanel demo-only styles (port of yui ROOT tweaks layout). */
  .twk-panel {
    position: fixed; bottom: 16px; right: 16px;
    width: 300px; max-height: calc(100vh - 48px);
    background: rgba(252, 247, 233, 0.96);
    border: 1px solid #DCDECF; border-radius: 14px;
    box-shadow: 0 16px 40px -10px rgba(20,18,12,0.30);
    z-index: 10002;
    backdrop-filter: blur(8px);
    overflow: auto;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1A1C16;
  }
  .twk-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid #ECE3CE;
    font-weight: 600; font-size: 13px;
  }
  .twk-x {
    appearance: none; background: transparent; border: 0;
    width: 22px; height: 22px; border-radius: 6px;
    cursor: pointer; color: #66695C; font-size: 16px;
  }
  .twk-x:hover { background: #F0E8D2; }
  .twk-body { padding: 8px 14px 14px; display: flex; flex-direction: column; gap: 12px; }
  .twk-sect-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: #66695C;
    margin-bottom: 6px;
  }
  .twk-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding: 4px 0;
  }
  .twk-lbl { font-size: 12px; color: #66695C; }
  .twk-seg { display: inline-flex; gap: 2px; background: rgba(0,0,0,0.04); padding: 2px; border-radius: 8px; }
  .twk-seg-opt {
    appearance: none; background: transparent; border: 0;
    padding: 3px 8px; font-size: 11px; border-radius: 6px;
    color: #66695C; cursor: pointer; font-weight: 500;
  }
  .twk-seg-opt.active { background: white; color: #1A1C16; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .twk-toggle {
    appearance: none; background: #ECE3CE; border: 0;
    width: 28px; height: 16px; border-radius: 999px;
    position: relative; cursor: pointer;
    transition: background .15s;
  }
  .twk-toggle .twk-thumb {
    position: absolute; left: 2px; top: 2px;
    width: 12px; height: 12px; border-radius: 999px;
    background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    transition: transform .15s;
  }
  .twk-toggle.on { background: #D87740; }
  .twk-toggle.on .twk-thumb { transform: translateX(12px); }
  .twk-select {
    appearance: none; background: white;
    border: 1px solid #DCDECF; border-radius: 6px;
    padding: 3px 8px; font-size: 11px; color: #1A1C16;
    font-family: inherit; cursor: pointer;
  }
  .twk-slider { display: inline-flex; align-items: center; gap: 6px; }
  .twk-slider input[type="range"] { width: 130px; }
  .twk-num { font-size: 11px; color: #66695C; font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; }
</style>
</head>
<body>
<div class="demo-banner">PREVIEW · demo mode · no backend</div>
<script src="autoworkbench.js"></script>
<script>
  window.AutoWorkbench.mountDemo(document.body);
</script>
</body>
</html>
